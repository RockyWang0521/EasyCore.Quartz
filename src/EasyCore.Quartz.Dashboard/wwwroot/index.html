<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__TITLE__ Dashboard</title>
  <base href="__BASE__" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <header class="hf-header">
    <div class="hf-brand">
      <span class="hf-logo">Q</span>
      <span class="hf-title">__TITLE__ Dashboard</span>
    </div>
    <nav class="hf-nav" id="main-nav">
      <button type="button" data-view="overview" class="nav-link active">
        <span class="nav-label">Dashboard</span>
      </button>
      <button type="button" data-view="jobs" class="nav-link">
        <span class="nav-label">Jobs</span>
        <span class="nav-count" id="nav-jobs">0</span>
      </button>
      <button type="button" data-view="recurring" class="nav-link">
        <span class="nav-label">Recurring</span>
        <span class="nav-count" id="nav-recurring">0</span>
      </button>
      <button type="button" data-view="executing" class="nav-link">
        <span class="nav-label">Executing</span>
        <span class="nav-count" id="nav-executing">0</span>
      </button>
      <button type="button" data-view="history" class="nav-link">
        <span class="nav-label">Retries</span>
        <span class="nav-count nav-count-warn" id="nav-retries">0</span>
      </button>
      <button type="button" data-view="http" class="nav-link">
        <span class="nav-label">HTTP Jobs</span>
        <span class="nav-count" id="nav-http">0</span>
      </button>
      <button type="button" data-view="servers" class="nav-link">
        <span class="nav-label">Servers</span>
        <span class="nav-count" id="nav-servers">1</span>
      </button>
    </nav>
    <div class="hf-actions">
      <a href="__APP__" class="back-link" title="Back to application">&#8617; Back to site</a>
    </div>
  </header>

  <main class="hf-main">
    <div class="hf-toolbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="toolbar-right">
        <span id="last-refresh" class="muted"></span>
        <button type="button" id="btn-refresh" class="btn btn-sm">Refresh</button>
      </div>
    </div>
    <div id="view-root" class="view-root"></div>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">Dialog</h2>
        <button type="button" id="modal-close" class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-actions">
        <button type="button" id="modal-cancel" class="btn">Cancel</button>
        <button type="button" id="modal-ok" class="btn btn-primary">OK</button>
      </div>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
